<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Rerun Web Viewer (local)</title>
    <style>
      html, body { height: 100%; margin: 0; }
      #app { width: 100%; height: 100%; }
    </style>
  </head>
  <body>
    <div id="app"></div>

    <script type="module">
      import { WebViewer } from "https://esm.sh/@rerun-io/web-viewer";

      // If you have an .rrd file hosted somewhere, put the URL here:
      const rrdUrl = "https://app.rerun.io/version/0.29.2/examples/arkit_scenes.rrd";
      const viewer = new WebViewer();
      await viewer.start(rrdUrl, document.getElementById("app"), { width: "100%", height: "100%" });


      // If you prefer drag & drop, the viewer UI supports it (no extra code).
      console.log("Rerun viewer created:", viewer);
    </script>
  </body>
</html>
